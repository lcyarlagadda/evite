services:
  invite:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 8080
    volumes:
      - rsvp-data:/app/data
    expose:
      - "8080"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - invite

volumes:
  rsvp-data:
  caddy-data:
  caddy-config:
