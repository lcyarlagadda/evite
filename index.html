<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>You're Invited — What Will It Bee?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Fredoka:wght@400;500;600&family=Pacifico&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div class="bg-honeycomb" aria-hidden="true"></div>
    <div class="bg-pattern" aria-hidden="true"></div>
    <div class="pollen-field" id="pollen-field" aria-hidden="true"></div>

    <div class="bee-sky" aria-hidden="true">
      <span class="bee bee-1"><span class="bee-body" aria-hidden="true">🐝</span></span>
      <span class="bee bee-2"><span class="bee-body" aria-hidden="true">🐝</span></span>
      <span class="bee bee-3"><span class="bee-body" aria-hidden="true">🐝</span></span>
      <span class="bee bee-4"><span class="bee-body" aria-hidden="true">🐝</span></span>
      <span class="bee bee-5"><span class="bee-body" aria-hidden="true">🐝</span></span>
    </div>

    <div class="sparkle-burst hidden" id="sparkle-burst" aria-hidden="true"></div>
    <div class="confetti-layer" id="confetti-layer" aria-hidden="true"></div>

    <!-- Step 1: Envelope → invite reveal -->
    <section id="invite-scene" class="scene scene-active" aria-label="Your invitation">
      <div class="invite-backdrop hidden" id="invite-backdrop" aria-hidden="true"></div>

      <div id="envelope-stage">
        <p class="tap-hint" id="tap-hint">
          <span class="tap-hint-action">Tap the envelope</span>
          <span class="tap-hint-tagline">something buzz-worthy awaits</span>
          <span class="tap-hint-icon" aria-hidden="true">🍯</span>
        </p>

        <div class="envelope-stack" id="envelope-stack">
          <div class="envelope-wrapper" id="envelope-wrapper">
            <div class="envelope-glow" aria-hidden="true"></div>
            <div class="envelope" id="envelope">
              <div class="envelope-back"></div>
              <div class="envelope-liner" aria-hidden="true"></div>
              <div class="envelope-pocket">
                <div class="invite-card" id="invite-card">
                  <img src="" alt="Gender Reveal Invitation for Himani & Praneeth" />
                </div>
              </div>
              <div class="envelope-front-left"></div>
              <div class="envelope-front-right"></div>
              <div class="envelope-front-bottom">
                <span class="envelope-names">Himani &amp; Praneeth</span>
              </div>
              <div class="envelope-flap">
                <div class="envelope-flap-inner" aria-hidden="true"></div>
                <div class="wax-seal">
                  <span class="seal-icon">🐝</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="invite-actions hidden" id="invite-actions">
        <button type="button" class="btn btn-primary btn-buzz invite-rsvp-btn" id="open-rsvp-btn">
          <span>Send RSVP</span>
          <span class="btn-bee">🐝</span>
        </button>
      </div>
    </section>

    <!-- RSVP form — slides up from bottom over the invite -->
    <div class="rsvp-sheet hidden" id="rsvp-sheet" aria-label="RSVP form">
      <div class="rsvp-sheet-panel">
        <div class="rsvp-sheet-handle" aria-hidden="true"></div>
        <button type="button" class="back-link" id="back-to-invite-btn">← Back</button>

        <div class="rsvp-header">
          <h2 id="rsvp-title">RSVP 🐝</h2>
        </div>

        <form id="rsvp-form" class="rsvp-form rsvp-form-compact" novalidate>
          <div class="form-group">
            <label for="name">Your Name</label>
            <input type="text" id="name" name="name" placeholder="Who's buzzing in?" autocomplete="name" />
          </div>

          <div class="form-group">
            <label>Will you attend?</label>
            <div class="radio-group radio-group-compact">
              <label class="radio-pill">
                <input type="radio" name="attendance" value="yes" />
                <span>Absolutely, yes!</span>
              </label>
              <label class="radio-pill">
                <input type="radio" name="attendance" value="no" />
                <span>Bummer, no.</span>
              </label>
              <label class="radio-pill">
                <input type="radio" name="attendance" value="maybe" />
                <span>Still deciding, may be?</span>
              </label>
            </div>
          </div>

          <div class="form-group">
            <label>Team Boy or Girl?</label>
            <div class="team-picker team-picker-compact">
              <label class="team-option team-boy">
                <input type="radio" name="prediction" value="boy" />
                <span class="team-card">
                  <span class="team-emoji">💙</span>
                  <span class="team-label">Boy</span>
                </span>
              </label>
              <label class="team-option team-girl">
                <input type="radio" name="prediction" value="girl" />
                <span class="team-card">
                  <span class="team-emoji">💗</span>
                  <span class="team-label">Girl</span>
                </span>
              </label>
            </div>
          </div>

          <div class="form-group" id="guests-group">
            <label>Head count</label>
            <div class="headcount-row">
              <span class="headcount-label">Adults</span>
              <div class="guest-picker guest-picker--headcount">
                <label class="guest-option">
                  <input type="radio" name="adults" value="1" />
                  <span>1</span>
                </label>
                <label class="guest-option">
                  <input type="radio" name="adults" value="2" />
                  <span>2</span>
                </label>
                <label class="guest-option">
                  <input type="radio" name="adults" value="3" />
                  <span>3</span>
                </label>
                <label class="guest-option">
                  <input type="radio" name="adults" value="4" />
                  <span>4</span>
                </label>
                <label class="guest-option">
                  <input type="radio" name="adults" value="5" />
                  <span>5+</span>
                </label>
              </div>
            </div>
            <div class="headcount-row">
              <span class="headcount-label">Kids</span>
              <div class="guest-picker guest-picker--headcount">
                <label class="guest-option">
                  <input type="radio" name="kids" value="0" />
                  <span>0</span>
                </label>
                <label class="guest-option">
                  <input type="radio" name="kids" value="1" />
                  <span>1</span>
                </label>
                <label class="guest-option">
                  <input type="radio" name="kids" value="2" />
                  <span>2</span>
                </label>
                <label class="guest-option">
                  <input type="radio" name="kids" value="3" />
                  <span>3</span>
                </label>
                <label class="guest-option">
                  <input type="radio" name="kids" value="4" />
                  <span>4+</span>
                </label>
              </div>
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-full btn-buzz btn-compact" id="submit-btn">
            <span>Send RSVP</span>
            <span class="btn-bee">🍯</span>
          </button>
          <p class="form-status hidden" id="form-status" role="status"></p>
        </form>
      </div>
    </div>

    <!-- Confirmation -->
    <section id="success-scene" class="scene hidden">
      <div class="success-card">
        <div class="success-bees" aria-hidden="true">
          <span>🐝</span><span>🐝</span><span>🐝</span>
        </div>
        <div class="success-icon" id="success-icon">🎉</div>
        <h2 id="success-title">Thanks!</h2>
        <p id="success-message">Your RSVP fluttered straight to Himani & Praneeth.</p>
        <p class="success-sub" id="success-sub">We can't wait to celebrate with you!</p>
        <button type="button" class="btn btn-secondary" id="view-invite-btn">Peek at the invite again</button>
      </div>
    </section>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
