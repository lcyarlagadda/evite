name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-fly:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    if: github.repository != ''
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
