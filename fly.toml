# fly.toml — Fly.io deployment (free *.fly.dev public URL)
# Docs: https://fly.io/docs

app = 'gender-reveal-invite'
primary_region = 'iad'

[build]

[env]
  PORT = '8080'
  NODE_ENV = 'production'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1

[mounts]
  source = 'rsvp_data'
  destination = '/app/data'
